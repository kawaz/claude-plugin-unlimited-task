# unlimited-task 設定ファイル
# /unlimited-task:start 実行時に .unlimited-task/config.yaml としてコピーされます

# プロジェクト情報（sender がお題を作る際のコンテキスト）
project:
  name: ""                        # 自動検出（git remote / ディレクトリ名）
  description: ""                 # プロジェクト概要（sender のコンテキスト）
  context_files: []               # sender が読むべきファイル (README.md, CLAUDE.md, 設計書等)

# カテゴリ設定
categories:
  engineering:
    enabled: true
    description: "実装・テスト・設計タスク"
  research:
    enabled: true
    description: "調査・比較分析レポート"
  fun:
    enabled: true
    description: "ペルソナ討論・ブレスト・エンタメ系"

# sender 設定
sender:
  batch_size: 3                   # 1バッチあたりの生成数
  sleep_seconds: 540              # バッチ間の休憩（秒）
  max_instructions: 100           # 生成上限（到達後は sleep ループのみ）
  # お題の方向性ガイダンス（自由記述、sender のプロンプトに注入）
  guidance: ""
  # 例: "セキュリティ寄りのタスクを多めに"
  # 例: "新規機能のアイデア出しを重視"

# receiver 設定
receiver:
  sleep_seconds: 300              # タスク間の休憩（秒）
  category_balance: true          # カテゴリ偏りを防ぐ（各カテゴリを順番に消化）
  drafts_dir: "docs/drafts"      # 新規ドキュメントの配置先
  acquired_timeout_seconds: 3600  # acquired 放置タイムアウト（秒）
  max_retries: 0                  # 0 = 失敗したらスキップ
  # 追加コンテキスト（receiver に渡す補足指示）
  additional_context: ""
